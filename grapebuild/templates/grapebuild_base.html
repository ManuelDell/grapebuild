<!DOCTYPE html>
<html lang="{{ lang or 'de' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>{% block title %}GrapeBuild{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/assets/grapebuild/images/grapebuild-icon.svg">
<script>
window._gb = {
  csrf: {{ csrf_token | tojson }},
  user: {{ user | tojson }},
  siteName: {{ frappe_site_name_header | tojson if frappe_site_name_header else '""' }}
};
function _gbFetch(method, args) {
  return fetch('/api/method/' + method, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Frappe-CSRF-Token': window._gb.csrf
    },
    body: JSON.stringify(args || {})
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(d) {
    if (d.exc) throw new Error(d.exc);
    return d.message;
  });
}
</script>
{% block head %}{% endblock %}
</head>
<body class="gb-www-body">
{% block body %}{% endblock %}
</body>
</html>
