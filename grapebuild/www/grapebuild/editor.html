{% extends "grapebuild/templates/grapebuild_base.html" %}

{% block title %}GrapeBuild Editor{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.13/dist/css/grapes.min.css">
<link rel="stylesheet" href="/assets/grapebuild/css/grapebuild-www.css">
<link rel="stylesheet" href="/assets/grapebuild/css/grapebuild-editor-www.css">
{% endblock %}

{% block body %}
<div class="gb-editor-app" id="gb-editor-app">

  <div class="gb-editor-toolbar" id="gb-editor-toolbar">
    <div class="gb-editor-toolbar__left">
      <a href="/grapebuild/hub" class="gb-btn gb-btn--ghost gb-btn--sm gb-btn--icon" title="Zurück zum Hub">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <img src="/assets/grapebuild/images/grapebuild-icon.svg" alt="" class="gb-editor-toolbar__logo">
      <span class="gb-editor-toolbar__page-title" id="gb-page-title">Lade…</span>
    </div>

    <div class="gb-editor-toolbar__center" id="gb-device-btns">
      <button class="gb-device-btn gb-device-btn--active" data-device="desktop" title="Desktop">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </button>
      <button class="gb-device-btn" data-device="tablet" title="Tablet">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </button>
      <button class="gb-device-btn" data-device="mobile" title="Mobil">
        <svg width="14" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="gb-editor-toolbar__right">
      <span class="gb-status-text" id="gb-status"></span>
      <button class="gb-btn gb-btn--ghost gb-btn--sm" id="gb-btn-save">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        Speichern
      </button>
      <button class="gb-btn gb-btn--ghost gb-btn--sm" id="gb-btn-maintenance" title="Wartungsmodus">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
        Wartung
      </button>
      <button class="gb-btn gb-btn--danger gb-btn--sm" id="gb-btn-unpublish" style="display:none">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
        Depublizieren
      </button>
      <button class="gb-btn gb-btn--primary gb-btn--sm" id="gb-btn-publish">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Publizieren
      </button>
    </div>
  </div>

  <!-- 3-column layout via position:absolute — works regardless of flex/grid inheritance -->
  <div id="gb-layout">

    <!-- Left sidebar: Blöcke / Ebenen -->
    <div id="gb-left">
      <div class="gb-ptabs" id="gb-left-tabs">
        <button class="gb-ptab gb-ptab--active" data-panel="gb-left" data-tab="gb-blocks">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Blöcke
        </button>
        <button class="gb-ptab" data-panel="gb-left" data-tab="gb-layers">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          Ebenen
        </button>
      </div>
      <div id="gb-blocks" class="gb-pane"></div>
      <div id="gb-layers" class="gb-pane" style="display:none"></div>
    </div>

    <!-- Canvas: GrapesJS renders here — absolute between the two sidebars -->
    <div id="gjs"></div>

    <!-- Right sidebar: Stil / Attribute -->
    <div id="gb-right">
      <div class="gb-ptabs" id="gb-right-tabs">
        <button class="gb-ptab gb-ptab--active" data-panel="gb-right" data-tab="gb-styles">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07"/></svg>
          Stil
        </button>
        <button class="gb-ptab" data-tab="gb-traits" data-panel="gb-right">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Attribute
        </button>
      </div>
      <div id="gb-styles" class="gb-pane"></div>
      <div id="gb-traits" class="gb-pane" style="display:none"></div>
    </div>

  </div>

</div>

<!-- Publish-Result Modal -->
<div class="gb-modal-backdrop" id="gb-publish-modal" hidden>
  <div class="gb-modal gb-modal--sm">
    <div class="gb-modal__header">
      <h2 class="gb-modal__title" id="gb-publish-title">Veröffentlicht</h2>
      <button class="gb-modal__close" id="gb-publish-modal-close">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="gb-modal__body">
      <p id="gb-publish-url-wrap" style="display:none">
        Seite live unter: <a id="gb-publish-url" href="#" target="_blank"></a>
      </p>
      <ul class="gb-warnings" id="gb-publish-warnings"></ul>
    </div>
    <div class="gb-modal__footer">
      <a id="gb-publish-preview-btn" href="#" target="_blank" class="gb-btn gb-btn--ghost" style="display:none">Seite ansehen</a>
      <button class="gb-btn gb-btn--primary" id="gb-publish-ok">OK</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.js"></script>
<script src="/assets/grapebuild/js/grapebuild-editor-www.js"></script>
{% endblock %}
